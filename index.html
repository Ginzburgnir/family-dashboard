      <a class="wb-footer-btn" id="wb-open-webtop" href="https://webtop.smartschool.co.il" target="_blank" rel="noopener">פתח Webtop ↗</a>
    </div>
  </div>
</div>

<script>
(function() {
  const WEBTOP_BASE = 'https://webtop.smartschool.co.il';
  const SEEN_KEY = 'wb_seen_v2';

  let seen = {};
  try { seen = JSON.parse(localStorage.getItem(SEEN_KEY) || '{}'); } catch(e){}
  const saveSeen = () => { try { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); } catch(e){} };

  // Stable ID for an item (uses .id or hash of fields)
  const itemKey = (kid, kind, item) => {
    const fallback = (item.sender||'') + '|' + (item.subject||item.title||'') + '|' + (item.date||'');
    return kid + '_' + kind + '_' + (item.id || fallback);
  };

  const isNew = (kid, kind, item) => !seen[itemKey(kid, kind, item)];

  const markSeen = (kid, kind, item) => {
    seen[itemKey(kid, kind, item)] = Date.now();
    saveSeen();
  };

  const escapeHtml = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  let currentTab = 'ron_msg'; // default tab

  function countAllNew() {
    const F = window.FAMILY;
    if (!F) return 0;
    let n = 0;
    for (const kid of [F.ron, F.yuval]) {
      const kidId = kid.name;
      for (const m of (kid.messages || [])) if (isNew(kidId, 'msg', m)) n++;
      for (const n2 of (kid.notifications || [])) if (isNew(kidId, 'notif', n2)) n++;
    }
    return n;
  }

  function refreshFab() {
    const badge = document.getElementById('wb-fab-badge');
    if (!badge) return;
    const n = countAllNew();
    badge.textContent = n;
    badge.classList.toggle('zero', n === 0);
  }

  function renderTabs() {
    const F = window.FAMILY;
    const tabs = document.getElementById('wb-tabs');
    if (!F || !tabs) return;

    const counts = {
      ron_msg: { items: F.ron.messages || [], new: 0, label: 'הודעות', color: 'ron', name: 'רון' },
      ron_notif: { items: F.ron.notifications || [], new: 0, label: 'התראות', color: 'ron', name: 'רון' },
      yuval_msg: { items: F.yuval.messages || [], new: 0, label: 'הודעות', color: 'yuval', name: 'יובל' },
      yuval_notif: { items: F.yuval.notifications || [], new: 0, label: 'התראות', color: 'yuval', name: 'יובל' },
    };
    counts.ron_msg.new = (F.ron.messages || []).filter(m => isNew('רון','msg',m)).length;
    counts.ron_notif.new = (F.ron.notifications || []).filter(n => isNew('רון','notif',n)).length;
    counts.yuval_msg.new = (F.yuval.messages || []).filter(m => isNew('יובל','msg',m)).length;
    counts.yuval_notif.new = (F.yuval.notifications || []).filter(n => isNew('יובל','notif',n)).length;

    tabs.innerHTML = '';
    for (const [key, info] of Object.entries(counts)) {
      const btn = document.createElement('button');
      btn.className = `wb-tab ${info.color} ${currentTab === key ? 'active' : ''}`;
      const icon = info.label === 'הודעות' ? '✉' : '🔔';
      btn.innerHTML = `
        <span class="dot"></span>
        <span>${info.name} · ${icon} ${info.label}</span>
        <span class="badge ${info.new === 0 ? 'zero' : ''}">${info.new || info.items.length}</span>
      `;
      btn.addEventListener('click', () => { currentTab = key; renderTabs(); renderList(); });
      tabs.appendChild(btn);
    }
  }

  function renderList() {
    const F = window.FAMILY;
    const list = document.getElementById('wb-list');
    if (!F || !list) return;

    const [kidKey, kind] = currentTab.split('_');
    const kid = kidKey === 'ron' ? F.ron : F.yuval;
    const kidName = kid.name;
    const items = kind === 'msg' ? (kid.messages || []) : (kid.notifications || []);

    list.innerHTML = '';
    if (items.length === 0) {
      list.innerHTML = '<div class="wb-empty">אין פריטים להצגה</div>';
      return;
    }

    items.forEach((item, idx) => {
      const div = document.createElement('div');
      const isItemNew = isNew(kidName, kind, item);
      div.className = 'wb-item' + (isItemNew ? ' new' : '');

      const title = kind === 'msg' ? (item.subject || '(ללא נושא)') : (item.title || '(התראה)');
      const meta = kind === 'msg' ? (item.sender || '') : (item.type || '');
      const body = kind === 'notif' ? (item.body || '') : '';
      const date = item.date || '';

      // Format date as DD/MM
      let dateStr = '';
      if (date && date.length >= 10) {
        dateStr = `${date.slice(8,10)}/${date.slice(5,7)}`;
      }

      div.innerHTML = `
        <div class="wb-item-head">
          <div class="wb-item-title">${escapeHtml(title)}</div>
          <div class="wb-item-date">${dateStr}</div>
        </div>
        ${meta ? `<div class="wb-item-meta">${escapeHtml(meta)}</div>` : ''}
        ${body ? `<div class="wb-item-body">${escapeHtml(body)}</div>` : ''}
      `;

      div.addEventListener('click', () => {
        // toggle expand if there's body content
        if (body) div.classList.toggle('expanded');
        // mark as seen
        if (isItemNew) {
          markSeen(kidName, kind, item);
          div.classList.remove('new');
          refreshFab();
          renderTabs();
        }
      });

      list.appendChild(div);
    });
  }

  function openModal() {
    document.getElementById('wb-modal-bg').classList.add('open');
    renderTabs();
    renderList();
  }
  function closeModal() {
    document.getElementById('wb-modal-bg').classList.remove('open');
  }

  function init() {
    document.getElementById('wb-fab').addEventListener('click', openModal);
    document.getElementById('wb-close-btn').addEventListener('click', closeModal);
    document.getElementById('wb-modal-bg').addEventListener('click', (e) => {
      if (e.target.id === 'wb-modal-bg') closeModal();
    });
    refreshFab();
  }

  const waitForData = setInterval(() => {
    if (window.FAMILY) {
      clearInterval(waitForData);
      init();
    }
  }, 200);
})();
</script>
