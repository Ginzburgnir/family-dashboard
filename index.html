<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Family Kitchen Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* Family Kitchen Dashboard — iPad 1180×820 */

:root {
  --bg-0: #0a0d14;
  --bg-1: #0f1320;
  --bg-2: #161b2c;
  --ink-0: #f4f1ea;
  --ink-1: rgba(244,241,234,.78);
  --ink-2: rgba(244,241,234,.52);
  --ink-3: rgba(244,241,234,.32);
  --line: rgba(244,241,234,.08);
  --line-2: rgba(244,241,234,.16);
  --glass: rgba(255,255,255,.03);
  --glass-2: rgba(255,255,255,.05);

  --ron: #5aa9ff;
  --ron-soft: rgba(90,169,255,.14);
  --yuval: #ff8a6b;
  --yuval-soft: rgba(255,138,107,.14);
  --mom: #c89aff;
  --mom-soft: rgba(200,154,255,.14);
  --dad: #7be0a6;
  --dad-soft: rgba(123,224,166,.14);

  --warn: #ffb45c;
  --good: #7be0a6;

  --orb-a: 92,148,255;
  --orb-b: 255,138,107;
}
[data-tod="morning"] { --orb-a: 255,168,108; --orb-b: 255,210,140; }
[data-tod="day"]     { --orb-a: 92,148,255;  --orb-b: 138,210,255; }
[data-tod="sunset"]  { --orb-a: 255,108,138; --orb-b: 255,168,108; }
[data-tod="night"]   { --orb-a: 88,124,255;  --orb-b: 168,124,255; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #000; color: var(--ink-0); overflow: hidden; }
body { font-family: 'Heebo', system-ui, sans-serif; }

#stage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }
#scaler {
  width: 1180px; height: 820px;
  transform-origin: center center;
  position: relative;
}
#root { width: 100%; height: 100%; display: block; }

.app {
  width: 100%; height: 100%;
  position: relative;
  background:
    radial-gradient(900px 600px at 85% -10%, rgba(var(--orb-a),.22), transparent 60%),
    radial-gradient(800px 500px at -10% 110%, rgba(var(--orb-b),.18), transparent 55%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 50%, var(--bg-0));
  direction: rtl;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Heebo', sans-serif;
}

.orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .55;
  pointer-events: none; animation: drift 28s ease-in-out infinite alternate;
}
.orb.a { width: 480px; height: 480px; left: -100px; top: -160px; background: rgba(var(--orb-a),.5); }
.orb.b { width: 380px; height: 380px; right: -80px; bottom: -140px; background: rgba(var(--orb-b),.45); animation-duration: 36s; animation-direction: alternate-reverse; }
@keyframes drift { to { transform: translate(50px, 30px) scale(1.08); } }

.grain {
  position: absolute; inset: 0; pointer-events: none; opacity: 0;
}
#scaler { transform-origin: center center; }
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg, #0a0c12);
  overflow: hidden;
}

.screen-wrap {
  flex: 1; min-height: 0; position: relative;
  padding: 28px 32px 12px;
  overflow: hidden;
}

.card {
  position: relative;
  background: linear-gradient(180deg, var(--glass-2), var(--glass));
  border: .5px solid var(--line-2);
  border-radius: 20px;
  padding: 18px 20px;
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 20px 40px -20px rgba(0,0,0,.5);
}
.card-title {
  font-size: 11px; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--ink-2); margin-bottom: 10px;
}
.card-en {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .14em; color: var(--ink-3);
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.card-head .card-title { margin-bottom: 0; }


/* Screen-specific styles */

/* TAB DOCK */
.dock {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 16px 16px;
  position: relative; z-index: 10;
}
.dock-inner {
  display: flex; gap: 4px; padding: 5px;
  background: rgba(20,24,38,.6);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: .5px solid var(--line-2);
  border-radius: 18px;
  box-shadow: 0 12px 40px -12px rgba(0,0,0,.6);
}
.dock-tab {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-radius: 13px;
  font-size: 13.5px; font-weight: 500;
  color: var(--ink-2);
  cursor: pointer; transition: all .25s;
  user-select: none;
  position: relative;
}
.dock-tab:hover { color: var(--ink-1); }
.dock-tab.active {
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
  color: var(--ink-0);
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset;
}
.dock-tab .tab-icon {
  font-size: 16px; line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px;
}
.dock-tab .tab-badge {
  background: var(--yuval); color: #fff;
  font-family: 'Geist Mono', monospace;
  font-size: 9px; padding: 1px 5px; border-radius: 999px;
  font-weight: 600;
}

/* HOME */
.home-grid {
  display: grid;
  grid-template-columns: 1.2fr 1.8fr 1fr;
  grid-template-rows: auto minmax(0,1fr) auto auto;
  gap: 10px;
  height: 100%;
  min-height: 0;
}
.home-grid .card { padding: 14px; }
.home-grid .kid-mini {
  gap: 10px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) transparent;
  -webkit-mask: linear-gradient(180deg, #000 calc(100% - 22px), transparent);
          mask: linear-gradient(180deg, #000 calc(100% - 22px), transparent);
  scroll-snap-type: y proximity;
  position: relative;
}
.home-grid .kid-mini::-webkit-scrollbar { width: 4px; }
.home-grid .kid-mini::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 4px; }
.home-grid .kid-mini::-webkit-scrollbar-track { background: transparent; }
.home-grid .kid-mini > * { scroll-snap-align: start; flex-shrink: 0; }
.home-grid .kid-mini::after {
  content: '↓ עוד למטה';
  position: sticky; bottom: 0;
  display: block; text-align: center;
  margin: -6px -14px -14px;
  padding: 6px 0 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.04));
  pointer-events: none;
  align-self: stretch;
}
.home-grid .today-card {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) transparent;
}
.home-grid .today-card::-webkit-scrollbar { width: 4px; }
.home-grid .today-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 4px; }
[data-theme="light"] .home-grid .kid-mini::-webkit-scrollbar-thumb,
[data-theme="light"] .home-grid .today-card::-webkit-scrollbar-thumb { background: rgba(26,24,20,.2); }
[data-orientation="portrait"] .home-grid {
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto auto auto;
  gap: 10px;
}
[data-orientation="portrait"] .home-grid .hero-card { grid-column: 1 / -1; }
[data-orientation="portrait"] .home-grid .today-card { grid-column: 1 / -1; }
[data-orientation="portrait"] .home-grid .pinned-strip,
[data-orientation="portrait"] .home-grid .widget-strip { grid-column: 1 / -1; }
[data-orientation="portrait"] .widget-strip { grid-template-columns: 1fr 1fr; flex-wrap: wrap; }
[data-orientation="portrait"] .widget.history { grid-column: 1 / -1; }
.pinned-strip {
  grid-column: 1 / -1;
  display: flex; align-items: stretch; gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(90deg, rgba(255,213,96,.06), rgba(255,213,96,.02));
  border: .5px solid rgba(255,213,96,.18);
  border-radius: 14px;
}
.pinned-label {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px 0 4px;
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .16em; color: #ffd560;
  text-transform: uppercase;
  border-left: .5px solid rgba(255,213,96,.2);
}
.pin-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px 6px 10px;
  background: rgba(255,255,255,.025);
  border: .5px solid var(--line);
  border-radius: 10px;
  flex: 1;
  min-width: 0;
}
.pin-chip .pc-icon {
  font-size: 22px; opacity: .9; flex-shrink: 0;
}
.pin-chip .pc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.pin-chip .pc-top {
  display: flex; align-items: baseline; gap: 6px;
}
.pin-chip .pc-days {
  font-family: 'Instrument Serif', serif;
  font-size: 22px; line-height: 1; color: var(--ink-0);
  font-variant-numeric: tabular-nums; direction: ltr;
}
.pin-chip .pc-days-lbl {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 12px; color: var(--ink-2);
}
.pin-chip .pc-date {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .1em; color: var(--ink-3);
  margin-right: auto;
}
.pin-chip .pc-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 14px; color: var(--ink-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.hero-card {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 28px;
  align-items: center;
  padding: 22px 28px;
}

.clock-big {
  font-family: 'Instrument Serif', serif;
  font-size: 132px; line-height: .85;
  letter-spacing: -.04em;
  color: var(--ink-0);
  font-variant-numeric: tabular-nums;
  direction: ltr;
  display: flex; align-items: baseline; gap: 2px;
}
.clock-big .colon {
  font-style: italic; color: var(--ink-2);
  animation: blink 1.2s steps(2,end) infinite;
}
@keyframes blink { 50% { opacity: .3; } }

.date-block { display: flex; flex-direction: column; gap: 4px; }
.date-block .day-heb {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 36px; font-weight: 500; line-height: 1;
}
.date-block .heb-d {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 22px; color: var(--ink-1); line-height: 1.1;
}
.date-block .greg {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase; margin-top: 4px;
}

.weather-block {
  display: flex; align-items: center; gap: 18px;
  padding-right: 20px;
  border-right: .5px solid var(--line);
}
.weather-temp {
  font-family: 'Instrument Serif', serif;
  font-size: 76px; line-height: 1;
  color: var(--ink-0);
  font-variant-numeric: tabular-nums;
  direction: ltr;
  display: flex; align-items: baseline;
}
.weather-temp .deg { font-size: 32px; color: var(--ink-2); }
.weather-meta {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 13px; color: var(--ink-1);
}
.weather-meta .row { display: flex; align-items: center; gap: 10px; direction: ltr; }
.weather-meta .lbl {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .14em; color: var(--ink-3);
  width: 48px;
}

/* TODAY card */
.today-card { display: flex; flex-direction: column; gap: 12px; min-height: 0; }

.briefing {
  padding: 14px 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(var(--orb-a),.10), rgba(var(--orb-b),.05));
  border: .5px solid var(--line-2);
  position: relative; overflow: hidden;
}
.briefing .ai-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .14em; color: var(--ink-2);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.briefing .ai-tag .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--good);
  box-shadow: 0 0 8px var(--good);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.85); }
}
.briefing-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 18px; line-height: 1.5;
  color: var(--ink-0);
}
.briefing-text .ron { color: var(--ron); font-weight: 500; }
.briefing-text .yuval { color: var(--yuval); font-weight: 500; }
.briefing-text .time {
  font-family: 'Geist Mono', monospace;
  font-size: 15px; padding: 1px 6px;
  background: rgba(255,255,255,.06); border-radius: 5px;
  direction: ltr; display: inline-block;
}

.timeline {
  display: flex; flex-direction: column; gap: 4px;
  flex: 1; min-height: 0; overflow: hidden;
}
.tl-row {
  display: grid;
  grid-template-columns: 50px 22px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 8px 4px;
  font-size: 13.5px;
  border-bottom: .5px solid var(--line);
}
.tl-row:last-child { border-bottom: none; }
.tl-row.now {
  background: linear-gradient(90deg, rgba(255,255,255,.05), transparent);
  border-radius: 8px;
  border-bottom: none;
}
.tl-row.past { opacity: .4; }
.tl-time {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--ink-2);
  direction: ltr; text-align: right;
}
.tl-row.now .tl-time { color: var(--ink-0); }
.tl-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-3); justify-self: center;
}
.tl-row.ron .tl-dot { background: var(--ron); }
.tl-row.yuval .tl-dot { background: var(--yuval); }
.tl-row.family .tl-dot { background: var(--ink-1); }
.tl-row.now .tl-dot { box-shadow: 0 0 10px currentColor; animation: pulse 2s infinite; }
.tl-text { color: var(--ink-1); }
.tl-row.now .tl-text { color: var(--ink-0); font-weight: 500; }
.tl-who {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3);
}


/* Kids quick cards, week calendar, recipes, notes, photos */

/* Kid summary on home */
.kid-mini {
  display: flex; flex-direction: column; gap: 12px;
  height: 100%;
}
.kid-mini-head {
  display: flex; align-items: center; gap: 12px;
}
.kid-av {
  width: 44px; height: 44px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 22px;
}
.kid-av.ron { background: var(--ron-soft); color: var(--ron); border: .5px solid rgba(90,169,255,.4); }
.kid-av.yuval { background: var(--yuval-soft); color: var(--yuval); border: .5px solid rgba(255,138,107,.4); }
.kid-mini-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 22px; line-height: 1; color: var(--ink-0);
}
.kid-mini-grade {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .12em; color: var(--ink-3);
  text-transform: uppercase; margin-top: 4px;
}

.now-pill {
  padding: 12px 14px; border-radius: 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.now-pill.ron { background: var(--ron-soft); border: .5px solid rgba(90,169,255,.3); }
.now-pill.yuval { background: var(--yuval-soft); border: .5px solid rgba(255,138,107,.3); }
.now-pill .now-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .14em; color: var(--ink-2);
  text-transform: uppercase;
}
.now-pill .now-text { font-size: 16px; font-weight: 500; color: var(--ink-0); }
.now-pill .now-room {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--ink-2);
  direction: ltr;
}

.next-list {
  display: flex; flex-direction: column; gap: 6px;
}
.next-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px;
  font-size: 13px;
  border-radius: 8px;
  background: rgba(255,255,255,.02);
}
.next-row .t {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px; color: var(--ink-2); direction: ltr;
  width: 40px;
}
.next-row .n { color: var(--ink-1); flex: 1; }
.next-row .r {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; color: var(--ink-3);
}

.hw-mini { display: flex; flex-direction: column; gap: 5px; }
.hw-mini .item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; padding: 4px 0;
}
.hw-mini .check {
  width: 16px; height: 16px; border-radius: 5px;
  border: 1.5px solid var(--ink-3);
  flex-shrink: 0; position: relative;
}
.hw-mini .check.done { background: var(--good); border-color: var(--good); }
.hw-mini .check.done::after {
  content: "✓"; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #062014; font-size: 11px; font-weight: 700;
}
.hw-mini .item.done .text { text-decoration: line-through; color: var(--ink-3); }
.hw-mini .text { flex: 1; color: var(--ink-1); }
.hw-mini .subj {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .1em; color: var(--ink-3);
  padding: 1px 5px; background: rgba(255,255,255,.04); border-radius: 4px;
}

.test-pill {
  padding: 10px 12px; border-radius: 12px;
  background: rgba(255,255,255,.025);
  border: .5px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.test-pill.urgent {
  background: rgba(255,180,92,.08);
  border-color: rgba(255,180,92,.3);
}
.test-days {
  display: flex; flex-direction: column; align-items: center;
  min-width: 38px;
}
.test-days .n {
  font-family: 'Instrument Serif', serif;
  font-size: 24px; line-height: 1;
  color: var(--ink-0);
  font-variant-numeric: tabular-nums;
}
.test-pill.urgent .test-days .n { color: var(--warn); }
.test-days .l {
  font-family: 'Geist Mono', monospace;
  font-size: 8px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase;
}
.test-info { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.test-info .s { font-size: 13px; color: var(--ink-0); font-weight: 500; }
.test-info .t { font-size: 11px; color: var(--ink-2); }

/* Week strip */
.week-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.week-day {
  padding: 10px 8px;
  background: rgba(255,255,255,.02);
  border: .5px solid var(--line);
  border-radius: 12px;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 110px;
}
.week-day.today {
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border-color: var(--line-2);
}
.week-day.weekend { opacity: .9; }
.week-day-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-bottom: 6px;
  border-bottom: .5px solid var(--line);
}
.week-day-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 14px; color: var(--ink-1); line-height: 1;
}
.week-day.today .week-day-name { color: var(--ink-0); }
.week-day-num {
  font-family: 'Instrument Serif', serif;
  font-size: 20px; color: var(--ink-1); line-height: 1;
  direction: ltr;
}
.week-day.today .week-day-num { color: var(--ink-0); }
.week-evt {
  display: flex; align-items: center; gap: 5px;
  font-size: 10.5px;
  padding: 3px 5px;
  border-radius: 5px;
  background: rgba(255,255,255,.025);
  white-space: nowrap; overflow: hidden;
}
.week-evt .dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0;
}
.week-evt.ron .dot { background: var(--ron); }
.week-evt.yuval .dot { background: var(--yuval); }
.week-evt.family .dot { background: var(--ink-1); }
.week-evt.holiday {
  background: rgba(255,180,92,.1);
  color: var(--warn);
}
.week-evt.holiday .dot { background: var(--warn); }
.week-evt .txt {
  color: var(--ink-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Recipes */
.recipes-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 18px;
  height: 100%;
}
.recipe-cats {
  display: flex; flex-direction: column;
  gap: 6px;
}
.recipe-cat {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,.02);
  border: .5px solid var(--line);
  cursor: pointer; transition: all .2s;
  font-size: 14px; color: var(--ink-1);
}
.recipe-cat:hover { background: rgba(255,255,255,.04); color: var(--ink-0); }
.recipe-cat.active {
  background: linear-gradient(135deg, rgba(255,138,107,.12), rgba(255,138,107,.04));
  border-color: rgba(255,138,107,.35);
  color: var(--ink-0);
}
.recipe-cat .ic { font-size: 18px; }
.recipe-cat .ct {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--ink-3);
  margin-right: auto;
}

.recipe-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
  overflow-y: auto;
  padding-bottom: 8px;
}
.recipe-card {
  padding: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  border: .5px solid var(--line-2);
  border-radius: 16px;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.recipe-card:hover { transform: translateY(-2px); border-color: var(--ink-3); }
.recipe-card .rec-emoji {
  font-size: 36px; line-height: 1;
}
.recipe-card .rec-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 20px; color: var(--ink-0); line-height: 1.2;
  font-weight: 500;
}
.recipe-card .rec-meta {
  display: flex; gap: 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: .08em; color: var(--ink-2);
  text-transform: uppercase;
}
.recipe-card .rec-meta span { display: inline-flex; align-items: center; gap: 4px; }
.recipe-card .rec-by {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .12em; color: var(--ink-3);
  text-transform: uppercase;
}

/* Recipe reader (hands-free mode) */
.recipe-reader {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
  z-index: 20;
  padding: 32px 48px;
  display: flex; flex-direction: column;
  gap: 24px;
}
.reader-head {
  display: flex; align-items: center; justify-content: space-between;
}
.reader-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 36px; color: var(--ink-0); font-weight: 500;
}
.reader-close {
  width: 44px; height: 44px; border-radius: 12px;
  background: rgba(255,255,255,.05);
  border: .5px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--ink-1); cursor: pointer;
}
.reader-step {
  flex: 1;
  display: flex; flex-direction: column; gap: 18px;
  padding: 32px 40px;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  border: .5px solid var(--line-2);
  border-radius: 24px;
  position: relative;
}
.step-num {
  font-family: 'Instrument Serif', serif;
  font-size: 80px; line-height: .8;
  color: var(--ink-0);
  font-style: italic;
  font-variant-numeric: tabular-nums;
  direction: ltr;
}
.step-num .of {
  font-family: 'Geist Mono', monospace;
  font-size: 14px; color: var(--ink-3);
  letter-spacing: .14em;
  display: block;
  margin-top: 4px;
  font-style: normal;
}
.step-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 32px; line-height: 1.4;
  color: var(--ink-0);
  flex: 1;
}
.step-timer {
  position: absolute; left: 32px; bottom: 32px;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px;
  background: rgba(255,180,92,.12);
  border: .5px solid rgba(255,180,92,.4);
  border-radius: 16px;
}
.step-timer .timer-num {
  font-family: 'Instrument Serif', serif;
  font-size: 44px; color: var(--warn); line-height: 1;
  font-variant-numeric: tabular-nums; direction: ltr;
}
.step-timer .timer-lbl {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; letter-spacing: .14em;
  color: var(--ink-1); text-transform: uppercase;
}

.reader-controls {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 8px 0;
}
.voice-hint {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: rgba(123,224,166,.08);
  border: .5px solid rgba(123,224,166,.3);
  border-radius: 999px;
}
.voice-mic {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--good);
  display: flex; align-items: center; justify-content: center;
  color: #062014; font-size: 14px;
  animation: pulse-mic 2s infinite;
  position: relative;
}
.voice-mic::before {
  content: ''; position: absolute; inset: -6px;
  border-radius: 50%; border: 1.5px solid var(--good);
  animation: ring 2s infinite;
}
@keyframes ring {
  0% { transform: scale(.85); opacity: .6; }
  100% { transform: scale(1.4); opacity: 0; }
}
@keyframes pulse-mic {
  0%,100% { box-shadow: 0 0 0 0 rgba(123,224,166,.4); }
  50% { box-shadow: 0 0 0 8px rgba(123,224,166,0); }
}
.voice-hint-text {
  font-size: 13px; color: var(--ink-1);
}
.voice-hint-text .heb { font-family: 'Heebo', sans-serif; }
.voice-hint-text .en {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--ink-3); letter-spacing: .12em; margin-right: 8px;
}
.reader-btns { display: flex; gap: 10px; }
.reader-btn {
  padding: 12px 24px;
  border-radius: 14px;
  background: rgba(255,255,255,.05);
  border: .5px solid var(--line-2);
  color: var(--ink-1);
  font-size: 14px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.reader-btn.primary {
  background: var(--ink-0); color: #0a0d14;
  border-color: transparent;
  font-weight: 500;
}
.reader-btn:hover { background: rgba(255,255,255,.08); }
.reader-btn.primary:hover { background: #fff; }

/* Notes / Bulletin board */
.notes-board {
  position: relative;
  height: 100%;
  padding: 12px;
}
.note {
  position: absolute;
  width: 200px;
  padding: 16px 18px;
  border-radius: 4px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.15) inset,
    0 16px 30px -10px rgba(0,0,0,.5),
    0 4px 10px -4px rgba(0,0,0,.4);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  color: rgba(0,0,0,.78);
  display: flex; flex-direction: column; gap: 8px;
  transition: transform .2s;
}
.note:hover { transform: translateY(-2px) rotate(0deg) !important; }
.note .note-from {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .14em;
  color: rgba(0,0,0,.5);
  text-transform: uppercase;
}
.note .note-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 17px; line-height: 1.35;
  color: rgba(0,0,0,.85);
  font-weight: 500;
}
.note .note-emoji { font-size: 28px; line-height: 1; }
.note .note-when {
  font-family: 'Geist Mono', monospace;
  font-size: 8.5px; letter-spacing: .1em;
  color: rgba(0,0,0,.4);
  margin-top: 2px;
}
.note .note-pin {
  position: absolute; top: -6px; right: 50%;
  transform: translateX(50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
  box-shadow: 0 2px 4px rgba(0,0,0,.4);
}
.note.color-mom { background: linear-gradient(180deg, #e8d4ff, #d4b8ff); }
.note.color-dad { background: linear-gradient(180deg, #c4f4d8, #a8e8c0); }
.note.color-ron { background: linear-gradient(180deg, #c4dcff, #a8c8ff); }
.note.color-yuval { background: linear-gradient(180deg, #ffd0c0, #ffb8a0); }
.note.color-fam { background: linear-gradient(180deg, #fff5b0, #ffe888); }

.note-photo {
  width: 100%; height: 100px;
  border-radius: 2px;
  margin-bottom: 4px;
  background-size: cover; background-position: center;
}
.note .voice-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px;
  background: rgba(0,0,0,.06);
  border-radius: 8px;
}
.note .voice-bar .play {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,.5); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
}
.note .voice-bar .wave {
  flex: 1; height: 16px;
  display: flex; align-items: center; gap: 2px;
}
.note .voice-bar .wave span {
  flex: 1; background: rgba(0,0,0,.35); border-radius: 1px;
}
.note .voice-bar .dur {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; color: rgba(0,0,0,.55);
}

.notes-add {
  position: absolute; bottom: 16px; left: 16px;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  background: rgba(20,24,38,.8);
  backdrop-filter: blur(20px);
  border: .5px solid var(--line-2);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px; letter-spacing: .12em;
  color: var(--ink-1); text-transform: uppercase;
}
.notes-add .qr {
  width: 36px; height: 36px;
  background: var(--ink-0);
  border-radius: 6px;
  padding: 4px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.notes-add .qr span {
  background: #0a0d14;
}

/* Photo frame */
.photo-frame {
  position: absolute; inset: 0;
  background: #000;
  z-index: 100;
  overflow: hidden;
  cursor: pointer;
}
.photo-frame .ph {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  animation: kenburns 18s ease-in-out infinite alternate;
  opacity: 0; transition: opacity 1.2s;
}
.photo-frame .ph.active { opacity: 1; }
@keyframes kenburns {
  from { transform: scale(1) translate(0,0); }
  to { transform: scale(1.12) translate(-2%, -1%); }
}
.photo-vignette {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.5) 100%),
    linear-gradient(180deg, rgba(0,0,0,.3) 0%, transparent 30%, transparent 60%, rgba(0,0,0,.7) 100%);
  pointer-events: none;
}
.photo-meta {
  position: absolute; bottom: 40px; right: 48px;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
  text-align: right;
}
.photo-meta .pm-date {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 36px; color: #fff; line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,.6);
}
.photo-meta .pm-loc {
  font-family: 'Geist Mono', monospace;
  font-size: 12px; letter-spacing: .14em; color: rgba(255,255,255,.85);
  text-transform: uppercase;
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
}
.photo-time {
  position: absolute; top: 40px; right: 48px;
  text-align: right;
  pointer-events: none;
}
.photo-time .pt-clock {
  font-family: 'Instrument Serif', serif;
  font-size: 100px; line-height: .9; color: #fff;
  font-variant-numeric: tabular-nums;
  direction: ltr;
  text-shadow: 0 4px 24px rgba(0,0,0,.7);
}
.photo-time .pt-date {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 24px; color: rgba(255,255,255,.9);
  text-shadow: 0 2px 8px rgba(0,0,0,.6);
}
.photo-tap-hint {
  position: absolute; bottom: 40px; left: 48px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px; letter-spacing: .18em;
  color: rgba(255,255,255,.55);
  text-transform: uppercase;
  pointer-events: none;
}

/* Photo grid (browse) */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 160px;
  gap: 10px;
  height: 100%;
  overflow-y: auto;
  padding: 4px;
  align-content: start;
}
.photo-tile {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  transition: transform .2s;
}
.photo-tile:hover { transform: scale(1.02); }
.photo-tile.tall { grid-row: span 2; }
.photo-tile.wide { grid-column: span 2; }
.photo-tile .photo-cap {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 12px;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.7));
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .12em; color: rgba(255,255,255,.85);
  text-transform: uppercase;
}

/* Bottom widget strip on Home */
.widget-strip {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1.1fr 1fr 1.3fr;
  gap: 14px;
}
.widget {
  position: relative;
  padding: 14px 18px;
  border-radius: 18px;
  background: linear-gradient(180deg, var(--glass-2), var(--glass));
  border: .5px solid var(--line-2);
  display: flex; align-items: center; gap: 14px;
  overflow: hidden;
}
.widget .w-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase;
}
.widget .w-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 16px; color: var(--ink-1); line-height: 1.1;
}
.widget .w-big {
  font-family: 'Instrument Serif', serif;
  font-size: 48px; line-height: .9;
  color: var(--ink-0);
  font-variant-numeric: tabular-nums; direction: ltr;
}
.widget .w-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 14px; line-height: 1.4; color: var(--ink-1);
  text-wrap: pretty;
}

/* Holiday */
.widget.holiday {
  background:
    radial-gradient(120% 80% at 0% 100%, rgba(123,224,166,.10), transparent 50%),
    linear-gradient(180deg, var(--glass-2), var(--glass));
}
.widget.holiday .w-icon {
  font-size: 32px; color: var(--good); opacity: .85;
}

/* History */
.widget.history { padding: 14px 18px; }
.widget.history .h-mark {
  width: 38px; align-self: stretch;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 4px 0;
  border-left: .5px solid var(--line);
  padding-left: 12px;
  flex-shrink: 0;
}
.widget.history .h-year {
  font-family: 'Instrument Serif', serif;
  font-size: 22px; color: var(--ink-1); line-height: 1;
  font-variant-numeric: tabular-nums; direction: ltr;
  font-style: italic;
}
.widget.history .h-lbl {
  font-family: 'Geist Mono', monospace;
  font-size: 8px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  margin-top: 4px;
}

/* Shabbat */
.widget.shabbat {
  background:
    radial-gradient(140% 100% at 100% 0%, rgba(255,180,92,.16), transparent 55%),
    linear-gradient(180deg, rgba(40,30,18,.6), rgba(20,16,10,.4));
  border-color: rgba(255,180,92,.25);
}
.widget.shabbat .candle {
  width: 50px; height: 64px; position: relative; flex-shrink: 0;
}
.widget.shabbat .candle .body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 14px; height: 44px;
  background: linear-gradient(180deg, #f4ead8, #d4c098);
  border-radius: 2px 2px 0 0;
}
.widget.shabbat .candle .wick {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 1.5px; height: 6px; background: #2a2010;
}
.widget.shabbat .candle .flame {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 22px;
  background: radial-gradient(ellipse at 50% 70%, #fff7d6 0%, #ffd97a 35%, #ff8b3a 70%, transparent 95%);
  border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
  filter: blur(.4px);
  animation: flicker 1.6s ease-in-out infinite;
  box-shadow: 0 0 16px rgba(255,200,120,.6), 0 0 28px rgba(255,140,60,.35);
}
.widget.shabbat .candle .flame::after {
  content:''; position:absolute; inset:25% 30% 10% 30%;
  background: radial-gradient(ellipse, #d6e8ff 0%, #6ba0ff 60%, transparent 80%);
  border-radius: 50%; opacity:.7;
}
@keyframes flicker {
  0%,100% { transform: translateX(-50%) scale(1) rotate(-1deg); opacity: 1; }
  50% { transform: translateX(-50%) scale(1.05) rotate(2deg); opacity: .95; }
}
.widget.shabbat .sh-times {
  display: flex; flex-direction: column; gap: 2px; flex: 1;
}
.widget.shabbat .sh-time-row {
  display: flex; align-items: baseline; gap: 8px;
  direction: ltr;
}
.widget.shabbat .sh-time-row .lbl {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: .14em; color: var(--ink-3);
  text-transform: uppercase;
}
.widget.shabbat .sh-time-row .val {
  font-family: 'Instrument Serif', serif;
  font-size: 22px; color: #ffd28a; line-height: 1;
}
.widget.shabbat .sh-parasha {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 14px; color: var(--ink-1); margin-top: 4px;
}

/* Theme toggle button */
.theme-toggle {
  position: fixed;
  top: 18px; left: 18px;
  width: 44px; height: 44px;
  border-radius: 14px;
  background: var(--glass-2);
  border: .5px solid var(--line-2);
  color: var(--ink-1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 40;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all .25s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
}
.theme-toggle:hover {
  color: var(--ink-0);
  transform: translateY(-1px);
}

/* ── LIGHT THEME ──────────────────────────────────────── */
html[data-theme="light"] {
  --bg: #f5f1ea;
  --bg-2: #ece5d8;
  --ink-0: #1a1814;
  --ink-1: rgba(26,24,20,.85);
  --ink-2: rgba(26,24,20,.62);
  --ink-3: rgba(26,24,20,.45);
  --line: rgba(26,24,20,.10);
  --line-2: rgba(26,24,20,.18);
  --glass: rgba(255,253,248,.72);
  --glass-2: rgba(255,253,248,.86);
  --ron: #2a6fdb;
  --ron-soft: rgba(42,111,219,.10);
  --yuval: #d65a3e;
  --yuval-soft: rgba(214,90,62,.10);
  --good: #1f8a5b;
}
html[data-theme="light"] body { background: #f5f1ea; color: var(--ink-0); }
html[data-theme="light"] .app {
  background:
    radial-gradient(1200px 800px at 0% 0%, rgba(255,213,96,.10), transparent 60%),
    radial-gradient(900px 700px at 100% 100%, rgba(123,176,255,.08), transparent 60%),
    #f5f1ea;
}
html[data-theme="light"] .orb { opacity: .35; mix-blend-mode: multiply; }
html[data-theme="light"] .grain { opacity: .08; }
html[data-theme="light"] .card,
html[data-theme="light"] .widget,
html[data-theme="light"] .countdown-card,
html[data-theme="light"] .month-cell,
html[data-theme="light"] .event-row {
  background: rgba(255,253,248,.72);
  border-color: rgba(26,24,20,.10);
  box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 8px 24px -16px rgba(40,30,18,.18);
}
html[data-theme="light"] .month-cell.empty { background: transparent; border-color: rgba(26,24,20,.04); }
html[data-theme="light"] .month-cell.weekend { background: rgba(26,24,20,.025); }
html[data-theme="light"] .month-cell.today { background: rgba(31,138,91,.08); border-color: rgba(31,138,91,.4); }
html[data-theme="light"] .dock { background: rgba(255,253,248,.78); border-color: rgba(26,24,20,.10); box-shadow: 0 8px 32px -8px rgba(40,30,18,.18); }
html[data-theme="light"] .dock-tab.active { background: rgba(26,24,20,.06); color: var(--ink-0); }
html[data-theme="light"] .countdown-overlay { background: rgba(245,241,234,.85); }
html[data-theme="light"] .widget.shabbat {
  background: linear-gradient(180deg, #fff5e0, #ffe6b8);
  border-color: rgba(214,148,42,.25);
}
html[data-theme="light"] .widget.shabbat .sh-time-row .val { color: #a86b1a; }
html[data-theme="light"] .widget.holiday { background: linear-gradient(180deg, #f0f8ee, #e0eedc); }
html[data-theme="light"] .pinned-strip { background: linear-gradient(90deg, rgba(214,148,42,.10), rgba(255,213,96,.04)); border-color: rgba(214,148,42,.25); }
html[data-theme="light"] .pinned-label { color: #a86b1a; }
html[data-theme="light"] .ev-tag.holiday { background: rgba(214,148,42,.12); color: #a86b1a; border-color: rgba(214,148,42,.3); }
html[data-theme="light"] .ev-tag.vacation { background: rgba(31,138,91,.10); color: var(--good); border-color: rgba(31,138,91,.3); }

<!-- React + Babel -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- ─── Real Data Loader ──────────────────────────────────────── -->
<script>
window.FAMILY_LOADING = true;

async function loadFamilyData() {
  const today = new Date();
  const Y = today.getFullYear();
  const M = String(today.getMonth()+1).padStart(2,'0');
  const D = String(today.getDate()).padStart(2,'0');
  const DOW = today.getDay(); // 0=Sun

  const DAY_HEB = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const MON_HEB = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const DOW_EN  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const data = {};

  // ── 1. Hebrew date + Shabbat ────────────────────────────────
  try {
    const hc = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${Y}&gm=${today.getMonth()+1}&gd=${today.getDate()}&g2h=1`).then(r=>r.json());
    data.date = {
      dayHeb: 'יום ' + DAY_HEB[DOW],
      hebDate: hc.hebrew || '',
      greg: `${D}/${M}/${Y}`,
    };

    // Shabbat times (Shoham area, lat 31.9971 lon 34.9394, geoname Shoham)
    const sh = await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=31.9956&longitude=34.9544&tzid=Asia/Jerusalem&m=40&b=20&i=on&M=on`).then(r=>r.json()); // Shoham, Israel
    let candleLight = '---', havdalah = '--:--', parasha = '', daysAway = 0;
    if (sh.items) {
      for (const item of sh.items) {
        if (item.category === 'candles') candleLight = item.date ? item.date.slice(11,16) : '---';
        if (item.category === 'havdalah') havdalah = item.date ? item.date.slice(11,16) : '---';
        if (item.category === 'parashat') parasha = item.title || '';
      }
    }
    // Days until Friday
    const dToFri = ((5 - DOW + 7) % 7) || 7;
    let todayIs = 'other';
    if (DOW === 5) todayIs = 'friday';
    else if (DOW === 6) todayIs = 'saturday';
    else if (dToFri === 1) todayIs = 'friday_eve'; // Thursday night

    data.shabbat = { candleLighting: candleLight, havdalah, parasha, daysAway: dToFri, todayIs };
  } catch(e) {
    console.warn('hebcal error', e);
    data.date = {
      dayHeb: 'יום ' + DAY_HEB[DOW],
      hebDate: '',
      greg: `${D}/${M}/${Y}`,
    };
    data.shabbat = { candleLighting: '--:--', havdalah: '--:--', parasha: '', daysAway: 0, todayIs: 'other' };
  }

  // ── 2. Weather (Open-Meteo, Shoham) ─────────────────────────
  try {
    const w = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=31.9956&longitude=34.9544' +
      '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code' +
      '&daily=temperature_2m_max,temperature_2m_min,weather_code,sunrise,sunset' +
      '&timezone=Asia%2FJerusalem&forecast_days=3'
    ).then(r=>r.json());

    const wc = w.current;
    const wd = w.daily;
    const iconMap = (code) => {
      if (code < 3) return 'sun';
      if (code < 50) return 'cloud';
      return 'rain';
    };
    const sunset = wd.sunset?.[0] ? wd.sunset[0].slice(11,16) : '--:--';
    const sunrise = wd.sunrise?.[0] ? wd.sunrise[0].slice(11,16) : '--:--';

    data.weather = {
      nowC: Math.round(wc.temperature_2m),
      feels: Math.round(wc.apparent_temperature),
      humidity: Math.round(wc.relative_humidity_2m),
      wind: Math.round(wc.wind_speed_10m),
      icon: iconMap(wc.weather_code),
      desc: wc.weather_code < 3 ? 'בהיר' : wc.weather_code < 50 ? 'מעונן' : 'גשום',
      sunrise, sunset,
      today: { hi: Math.round(wd.temperature_2m_max?.[0] || 0), lo: Math.round(wd.temperature_2m_min?.[0] || 0), icon: iconMap(wd.weather_code?.[0] || 0) },
      tomorrow: { hi: Math.round(wd.temperature_2m_max?.[1] || 0), lo: Math.round(wd.temperature_2m_min?.[1] || 0), icon: iconMap(wd.weather_code?.[1] || 0) },
    };
  } catch(e) {
    console.warn('weather error', e);
    data.weather = { nowC: '--', feels: '--', humidity: '--', wind: '--', icon: 'sun', desc: '', sunrise: '--:--', sunset: '--:--', today: { hi: '--', lo: '--', icon: 'sun' }, tomorrow: { hi: '--', lo: '--', icon: 'sun' } };
  }

  // ── 3. Webtop data (kids school) ────────────────────────────
  let webtop = null;
  try {
    webtop = await fetch('https://ginzburgnir.github.io/family-dashboard/webtop_data.json?t=' + Date.now()).then(r=>r.json());
  } catch(e) {
    console.warn('webtop error', e);
  }

  function mapKid(kidData, kidName, initial, grade, gradeEn) {
    const emptyNow = { time: '--:--', name: '—', room: '' };
    const emptyTest = { subj: '', topic: '', days: 0 };

    if (!kidData) {
      return {
        name: kidName, initial, grade, en: gradeEn,
        now: emptyNow, next: [], homework: [],
        test: emptyTest, lessonEvents: [], weeklyPlan: {},
        messages: [], notifications: []
      };
    }

    const DAY_HEB_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    const todayDow = DOW;
    const todayDayName = DAY_HEB_NAMES[todayDow];
    const nowMin = today.getHours() * 60 + today.getMinutes();

    // Convert period/time string to minutes
    const toMin = (s) => {
      if (!s) return null;
      const str = String(s);
      if (str.includes(':')) {
        const [h, m] = str.split(':').map(Number);
        return (h||0)*60 + (m||0);
      }
      const n = Number(str);
      if (Number.isFinite(n)) {
        // Period number → time (period 1 ≈ 08:00)
        const p2m = [null, 8*60, 8*60+50, 9*60+50, 10*60+40, 11*60+30, 12*60+25, 13*60+15, 14*60+5, 14*60+55, 15*60+45];
        return p2m[n] ?? n*60;
      }
      return null;
    };

    // weekly_plan is a DICT: { "ראשון": [{period, subject, teacher, topic, date}], ... }
    const weeklyPlanDict = kidData.weekly_plan || {};

    const todayLessons = (weeklyPlanDict[todayDayName] || []).map(l => ({
      time: String(l.period || ''),
      name: l.subject || '',
      room: l.teacher || '',
      _min: toMin(l.period),
    })).sort((a,b) => (a._min ?? 0) - (b._min ?? 0));

    let nowLesson = null, nextLessons = [];
    for (const lesson of todayLessons) {
      if (lesson._min == null) continue;
      if (!nowLesson && lesson._min <= nowMin && nowMin <= lesson._min + 45) {
        nowLesson = lesson;
      } else if (lesson._min > nowMin && nextLessons.length < 3) {
        nextLessons.push(lesson);
      }
    }

    // No lesson now → show first lessons of next school day
    if (!nowLesson) {
      for (let i = 1; i <= 7; i++) {
        const dow = (todayDow + i) % 7;
        const dayLessons = weeklyPlanDict[DAY_HEB_NAMES[dow]];
        if (dayLessons && dayLessons.length > 0) {
          const sorted = [...dayLessons].sort((a,b) => (toMin(a.period) ?? 0) - (toMin(b.period) ?? 0));
          nowLesson = { time: String(sorted[0].period||''), name: sorted[0].subject||'', room: sorted[0].teacher||'' };
          nextLessons = sorted.slice(1, 4).map(l => ({ time: String(l.period||''), name: l.subject||'', room: l.teacher||'' }));
          break;
        }
      }
      if (!nowLesson) nowLesson = emptyNow;
    }

    // homework: real fields are {date, day, period, subject, teacher, topic, hw}
    const todayISO = today.toISOString().slice(0, 10);
    const homework = (kidData.homework || [])
      .filter(hw => (hw.hw && hw.hw.trim()) && (!hw.date || hw.date >= todayISO))
      .slice(0, 6)
      .map(hw => ({
        subj: (hw.subject || '').slice(0, 8),
        text: hw.hw || hw.topic || '',
        done: false,
        date: hw.date || '',
      }));

    const lessonEvents = (kidData.lesson_events || []).slice(0, 8).map(ev => ({
      type: ev.type || '',
      date: ev.date || '',
      note: ev.note || ev.subject || '',
      subject: ev.subject || '',
    }));

    const messages = (kidData.messages || []).slice(0, 12).map(m => ({
      sender: m.sender || '',
      date: m.date || '',
      subject: m.subject || '',
      id: m.id || '',
      unread: !!m.unread,
    }));

    const notifications = (kidData.notifications || []).slice(0, 12).map(n => ({
      id: n.id || '',
      title: n.title || '',
      body: n.body || '',
      date: n.date || '',
      type: n.type || '',
      unread: !!n.unread,
    }));

    return {
      name: kidName, initial, grade, en: gradeEn,
      now: nowLesson, next: nextLessons,
      homework, test: emptyTest, lessonEvents,
      messages, notifications,
      weeklyPlan: weeklyPlanDict,
    };
  }

  // Build kids data - scraper outputs students as ARRAY
  let yuvalData = null, ronData = null;
  if (webtop && Array.isArray(webtop.students)) {
    for (const s of webtop.students) {
      if (s.name && s.name.includes('יובל')) yuvalData = s;
      else if (s.name && s.name.includes('רון')) ronData = s;
    }
  } else if (webtop && webtop.students) {
    const keys = Object.keys(webtop.students);
    const yKey = keys.find(k => k.includes('יובל'));
    const rKey = keys.find(k => k.includes('רון'));
    if (yKey) yuvalData = webtop.students[yKey];
    if (rKey) ronData = webtop.students[rKey];
  }

  data.yuval = mapKid(yuvalData, 'יובל', 'י', 'כיתה ב׳', 'GRADE 2');
  data.ron   = mapKid(ronData,   'רון',   'ר', 'כיתה ו׳', 'GRADE 6');

  // ── 4. Week view (combine calendar + webtop) ─────────────
  const weekDays = [];
  const DAYS_HEB = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const DAYS_TAG = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  // Start from last Sunday
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - DOW);

  for (let i = 0; i < 7; i++) {
    const d = new Date(startOfWeek);
    d.setDate(startOfWeek.getDate() + i);
    const dayDow = d.getDay();
    const isToday = d.toDateString() === today.toDateString();
    const isPast = d < today && !isToday;
    const isWeekend = dayDow === 5 || dayDow === 6;

    // Build events for this day from webtop
    const dayEvents = [];

    // Add Shabbat candles on Friday
    if (dayDow === 5 && data.shabbat.candleLighting !== '--:--') {
      dayEvents.push({ tag: 'holiday', text: '✦ נרות ' + data.shabbat.candleLighting });
    }

    weekDays.push({
      name: DAYS_HEB[dayDow],
      tag: DAYS_TAG[dayDow],
      num: d.getDate(),
      today: isToday,
      past: isPast,
      weekend: isWeekend,
      events: dayEvents,
    });
  }
  data.week = weekDays;

  // ── 5. Today events (from calendar/webtop) ───────────────
  data.todayEvents = [];

  // ── 6. Briefing ──────────────────────────────────────────
  const hw_yuval = data.yuval.homework.filter(h => !h.done);
  const hw_ron = data.ron.homework.filter(h => !h.done);
  const briefing = [{ type: 'text', value: 'בוקר טוב. ' }];
  if (hw_ron.length > 0) {
    briefing.push({ type: 'ron', value: 'לרון ' + hw_ron.length + ' שיעורי בית' });
    briefing.push({ type: 'text', value: '. ' });
  }
  if (hw_yuval.length > 0) {
    briefing.push({ type: 'yuval', value: 'ליובל ' + hw_yuval.length + ' שיעורי בית' });
    briefing.push({ type: 'text', value: '. ' });
  }
  if (briefing.length === 1) {
    briefing.push({ type: 'text', value: 'יום נעים למשפחה!' });
  }
  data.briefing = briefing;

  // ── 7. Upcoming events (static Israeli calendar) ─────────
  data.events = [
    { id: 'shavuot-vac', kind: 'vacation', name: 'חופשת שבועות', date: '21—24 במאי', daysAway: 9, icon: '☀', length: '4 ימים', _d: [2026,5,21] },
    { id: 'shavuot', kind: 'holiday', name: 'שבועות', date: '22 במאי', daysAway: 10, icon: '🌾', _d: [2026,5,22] },
    { id: 'summer', kind: 'vacation', name: 'חופש הגדול', date: '30 ביוני', daysAway: 49, icon: '☀', length: 'חודשיים', _d: [2026,6,30] },
    { id: 'rosh-hashana', kind: 'holiday', name: 'ראש השנה', date: '12 בספטמבר', daysAway: 123, icon: '🍎', _d: [2026,9,12] },
    { id: 'yom-kippur', kind: 'holiday', name: 'יום כיפור', date: '21 בספטמבר', daysAway: 132, icon: '✦', _d: [2026,9,21] },
    { id: 'sukkot', kind: 'vacation', name: 'חופשת סוכות', date: '26 בספט׳', daysAway: 137, icon: '◇', length: '9 ימים', _d: [2026,9,26] },
  ].map(e => {
    const target = new Date(e._d[0], e._d[1]-1, e._d[2]);
    const diff = Math.ceil((target - today) / (1000*60*60*24));
    return { ...e, daysAway: Math.max(0, diff) };
  }).filter(e => e.daysAway >= 0);
  data.events.sort((a,b) => a.daysAway - b.daysAway);

  // Next holiday for holiday card
  const nextHol = data.events.find(e => e.kind === 'holiday' || e.kind === 'vacation');
  data.holiday = nextHol ? {
    name: nextHol.name, nameEn: nextHol.name.toUpperCase(),
    daysAway: nextHol.daysAway, date: nextHol.date, icon: nextHol.icon,
    mood: nextHol.daysAway <= 3 ? 'very-soon' : nextHol.daysAway <= 14 ? 'soon' : 'far',
  } : null;

  // ── 8. History fact ──────────────────────────────────────
  try {
    const wikiUrl = `https://he.wikipedia.org/api/rest_v1/page/summary/${M}_${D}`;
    const wiki = await fetch(wikiUrl).then(r=>r.json());
    data.history = {
      year: '',
      text: wiki.extract ? wiki.extract.slice(0, 200) : 'יום מיוחד בהיסטוריה',
    };
  } catch(e) {
    data.history = { year: '', text: 'יום מיוחד בהיסטוריה.' };
  }

  // ── 9. Static data ───────────────────────────────────────
  data.presence = [
    { name: 'אמא', initial: 'מ', home: false },
    { name: 'אבא', initial: 'ב', home: true },
    { name: 'רון', initial: 'ר', home: false },
    { name: 'יובל', initial: 'י', home: false },
  ];
  data.notes = [
    { id: 1, color: 'fam', from: 'משפחה', text: 'לוח המשפחה — ברוכים הבאים! 🏠', when: '', x: 30, y: 20, rot: -2, pinned: true },
  ];
  data.photos = [

    { caption: 'חופשה', loc: 'ישראל', grad: 'linear-gradient(180deg, #f7d794 0%, #f5b461 50%, #4a90b8 100%)' },
  ];
  data.shopping = [];
  data.recipes = [];
  data.recipeCats = [];

  window.FAMILY = data;
  window.FAMILY_LOADING = false;
  console.log('✅ Family data loaded', data);
}

// Load data and then trigger React render
// Timeout fallback - render even if data fails
const dataTimeout = setTimeout(() => {
  if (window.FAMILY_LOADING !== false) {
    console.warn('Data load timeout - rendering with partial data');
    window.FAMILY_LOADING = false;
  }

loadFamilyData().then(() => {
  clearTimeout(dataTimeout);
}).catch(e => {
  console.error('Data load failed', e);
  clearTimeout(dataTimeout);
  window.FAMILY_LOADING = false;
});

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>

        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />

function TweakSection({ label, children }) {

}

function TweakRow({ label, value, children, inline = false }) {

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HEB_DOW = ['א','ב','ג','ד','ה','ו','ש']; // Sunday-first

function MonthView({ onSelect, pinnedIds }) {
  const F = window.FAMILY;
  // Today: Tue May 12, 2026
  const TODAY = { y: 2026, m: 5, d: 12 };
  const [cur, setCur] = React.useState({ y: 2026, m: 5 });

  const firstDow = new Date(cur.y, cur.m - 1, 1).getDay(); // 0 = Sun
  const daysInMonth = new Date(cur.y, cur.m, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7) cells.push(null);

  const eventsForDay = (d) => F.events.filter(e => e._d && e._d[0] === cur.y && e._d[1] === cur.m && e._d[2] === d);

  const goPrev = () => setCur(c => c.m === 1 ? { y: c.y - 1, m: 12 } : { y: c.y, m: c.m - 1 });
  const goNext = () => setCur(c => c.m === 12 ? { y: c.y + 1, m: 1 } : { y: c.y, m: c.m + 1 });
  const monthEvents = F.events.filter(e => e._d && e._d[0] === cur.y && e._d[1] === cur.m);

  return (
    <div className="card" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:14}}>
      <div className="month-head">
        <div className="month-nav" onClick={goNext} title="הבא">‹</div>
        <div className="month-title">
          <div className="mt-name">{HEB_MONTHS[cur.m - 1]}</div>
          <div className="mt-year">{cur.y}</div>
        </div>
        <div className="month-nav" onClick={goPrev} title="הקודם">›</div>
        <div style={{flex:1}}/>
        <div style={{fontFamily:'Geist Mono, monospace',fontSize:10,letterSpacing:'.14em',color:'var(--ink-3)'}}>
          {monthEvents.length} EVENTS · TAP A DAY
        </div>
      </div>

      <div className="month-grid">
        <div className="month-dow">
          {HEB_DOW.map(d => <div key={d} className="dow-cell">{d}</div>)}
        </div>
        <div className="month-cells">
          {cells.map((d, i) => {
            if (!d) return <div key={i} className="month-cell empty"/>;
            const evs = eventsForDay(d);
            const isToday = cur.y === TODAY.y && cur.m === TODAY.m && d === TODAY.d;
            const isPast = (cur.y < TODAY.y) || (cur.y === TODAY.y && cur.m < TODAY.m) || (cur.y === TODAY.y && cur.m === TODAY.m && d < TODAY.d);
            const dow = (firstDow + d - 1) % 7;
            const isWeekend = dow === 5 || dow === 6;
            return (
              <div key={i} className={`month-cell ${isToday?'today':''} ${isPast?'past':''} ${isWeekend?'weekend':''} ${evs.length?'has':''}`}
                   onClick={evs.length ? () => onSelect(evs[0]) : undefined}>
                <div className="mc-num">{d}</div>
                {evs.length > 0 && (
                  <div className="mc-events">
                    {evs.slice(0, 2).map(e => (
                      <div key={e.id} className={`mc-evt ${e.kind} ${pinnedIds && pinnedIds.has(e.id) ? 'pinned' : ''}`}>
                        <span className="mc-icon">{e.icon}</span>
                        <span className="mc-name">{e.name}</span>
                      </div>
                    ))}
                    {evs.length > 2 && <div className="mc-more">+{evs.length - 2}</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tod": "morning",
  "showFrameMode": true,

  "orientation": "landscape"
}/*EDITMODE-END*/;

function useScale(orientation) {
  React.useEffect(() => {
    const W = orientation === 'portrait' ? 820 : 1180;
    const H = orientation === 'portrait' ? 1180 : 820;
    const stage = document.getElementById('stage');
    const scaler = document.getElementById('scaler');
    if (scaler) { scaler.style.width = W + 'px'; scaler.style.height = H + 'px'; }
    const fit = () => {
      if (!scaler) return;
      const sx = window.innerWidth / W;
      const sy = window.innerHeight / H;
      scaler.style.transform = `scale(${Math.min(sx, sy)})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [orientation]);
}

function useClock() {
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => {
    const t = setInterval(() => setNow(prev => new Date(prev.getTime() + 1000)), 1000);
    return () => clearInterval(t);
  }, []);
  return now;
}

const TABS = [
  { id: 'home', label: 'בית', icon: '⌂' },
  { id: 'schedule', label: 'לו״ז', icon: '▦' },
  { id: 'notes', label: 'פתקים', icon: '✎', badge: 8 },
  { id: 'photos', label: 'גלריה', icon: '◐' },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState('home');
  const [frame, setFrame] = React.useState(false);
  const [pinnedIds, setPinnedIds] = React.useState(() =>
    new Set(window.FAMILY.events.filter(e => e.pinned).map(e => e.id))
  );
  const togglePin = React.useCallback((id) => {
    setPinnedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);
  const now = useClock();
  useScale(t.orientation);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-tod', t.tod);
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-orientation', t.orientation);
  }, [t.tod, t.theme, t.orientation]);

  // Idle → photo frame mode
  React.useEffect(() => {
    if (!t.showFrameMode) return;
    let timer;
    const reset = () => {
      clearTimeout(timer);
      timer = setTimeout(() => setFrame(true), t.idleSeconds * 1000);
    };
    const handler = () => { if (!frame) reset(); };
    reset();
    window.addEventListener('mousemove', handler);
    window.addEventListener('keydown', handler);
    window.addEventListener('click', handler);
    return () => {
      clearTimeout(timer);
      window.removeEventListener('mousemove', handler);
      window.removeEventListener('keydown', handler);
      window.removeEventListener('click', handler);
    };
  }, [t.showFrameMode, t.idleSeconds, frame]);

  let screen;
  if (tab === 'home') screen = <HomeScreen now={now} pinnedIds={pinnedIds}/>;
  else if (tab === 'schedule') screen = <ScheduleScreen pinnedIds={pinnedIds} togglePin={togglePin}/>;
  else if (tab === 'notes') screen = <NotesScreen/>;
  else if (tab === 'photos') screen = <PhotosScreen onEnterFrame={()=>setFrame(true)}/>;

  return (
    <div className="app">
      <div className="orb a"/>
      <div className="orb b"/>
      <div className="grain"/>

      <div className="screen-wrap">{screen}</div>

      {/* Theme toggle */}
      <div className="theme-toggle" onClick={() => setTweak('theme', t.theme === 'dark' ? 'light' : 'dark')} title="מצב בהיר/כהה">
        {t.theme === 'dark' ? (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <g stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
              <line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/>
              <line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/>
              <line x1="5.6" y1="5.6" x2="7" y2="7"/><line x1="17" y1="17" x2="18.4" y2="18.4"/>
              <line x1="5.6" y1="18.4" x2="7" y2="17"/><line x1="17" y1="7" x2="18.4" y2="5.6"/>
            </g>
          </svg>
        ) : (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" fill="currentColor"/>
          </svg>
        )}
      </div>

      <div className="dock">
        <div className="dock-inner">
          {TABS.map(T => (
            <div key={T.id} className={`dock-tab ${tab===T.id?'active':''}`} onClick={()=>setTab(T.id)}>
              <span className="tab-icon">{T.icon}</span>
              <span>{T.label}</span>
              {T.badge && <span className="tab-badge">{T.badge}</span>}
            </div>
          ))}
        </div>
      </div>

      {frame && t.showFrameMode && (
        <PhotoFrameMode now={now} onExit={()=>setFrame(false)}/>
      )}

      <TweaksPanel>
        <TweakSection label="עיצוב"/>
        <TweakRadio label="זמן ביום" value={t.tod}
          options={['morning','day','sunset','night']}
          onChange={v => setTweak('tod', v)}/>
        <TweakRadio label="מצב תצוגה" value={t.theme}
          options={['dark','light']}
          onChange={v => setTweak('theme', v)}/>
        <TweakRadio label="כיוון מסך" value={t.orientation}
          options={['landscape','portrait']}
          onChange={v => setTweak('orientation', v)}/>
        <TweakSection label="מצב סלייד-שואו"/>
        <TweakToggle label="הפעל אוטומטית" value={t.showFrameMode}
          onChange={v => setTweak('showFrameMode', v)}/>
        <TweakSlider label="זמן לפני הפעלה" value={t.idleSeconds}
          min={10} max={300} step={10} unit="s"
          onChange={v => setTweak('idleSeconds', v)}/>
        <TweakButton label="הפעל עכשיו" onClick={()=>setFrame(true)}>פתח גלריה</TweakButton>
      </TweaksPanel>
    </div>
  );
}

// Wait for data to load before rendering
function hideLoader() {
  const loader = document.getElementById('loader');
  if (loader) loader.style.display = 'none';
}

function renderWhenReady() {
  if (window.FAMILY_LOADING !== false) {
    setTimeout(renderWhenReady, 100);
    return;
  }
  if (!window.FAMILY) {
    // Fallback minimal data
    window.FAMILY = {
      date: { dayHeb: 'יום טוב', hebDate: '', greg: '' },
      weather: { nowC: '--', feels: '--', humidity: '--', wind: '--', icon: 'sun', desc: '', sunrise: '--:--', sunset: '--:--', today: { hi: '--', lo: '--', icon: 'sun' }, tomorrow: { hi: '--', lo: '--', icon: 'sun' } },
      shabbat: { candleLighting: '--:--', havdalah: '--:--', parasha: '', daysAway: 0, todayIs: 'other' },
      briefing: [{ type: 'text', value: 'בוקר טוב למשפחה!' }],
      todayEvents: [], week: [], events: [], notes: [], photos: [], shopping: [], recipes: [], recipeCats: [],
      ron: { name: 'רון', initial: 'ר', grade: 'כיתה ו׳', en: 'GRADE 6', now: {time:'--:--',name:'—',room:''}, next: [], homework: [], test: {subj:'',topic:'',days:0}, lessonEvents: [], weeklyPlan: [] },
      yuval: { name: 'יובל', initial: 'י', grade: 'כיתה ב׳', en: 'GRADE 2', now: {time:'--:--',name:'—',room:''}, next: [], homework: [], test: {subj:'',topic:'',days:0}, lessonEvents: [], weeklyPlan: [] },
      presence: [], holiday: null, history: { year: '', text: '' },
    };
  }
  try {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  } catch(err) {
    console.error('Render error:', err);
    hideLoader();
    document.getElementById('root').innerHTML = 
      '<div style="color:#ff6b6b;padding:40px;font-family:monospace;font-size:14px;direction:ltr;white-space:pre-wrap">' +
      '<b>RENDER ERROR:</b>\n' + err.message + '\n\n' + (err.stack || '') +
      '</div>';
  }
  setTimeout(hideLoader, 500);
}
renderWhenReady();

</script>

    </div>
